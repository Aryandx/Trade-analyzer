name: Market Data Update

on:
  schedule:
    # Every 30 min during NSE hours: 9:15 AM–3:30 PM IST = 3:45–10:00 UTC, Mon–Fri
    - cron: '15 4-9 * * 1-5'
    - cron: '45 4-9 * * 1-5'
  workflow_dispatch:   # allow manual trigger from GitHub UI

# Only one analysis at a time. While one runs, the next trigger queues.
# If a third trigger fires while one is running and one is queued,
# the queued run is replaced — so we never accumulate a backlog.
concurrency:
  group: market-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis
        run: python main.py
        env:
          PYTHONUNBUFFERED: '1'
          CI: 'true'

      - name: Push results to webapp
        run: python push_to_webapp.py

      - name: Commit and push if data changed
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add webapp/public/data/analysis.json \
                  results/latest_analysis.json \
                  results/prediction_log.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
            exit 0
          fi
          git pull --rebase origin main
          git commit -m "market: auto-update $(date -u '+%Y-%m-%d %H:%M') UTC [skip ci]"
          git push
